

services:

  calcifer:                          # FastAPI app (fire demon that powers everything)
    build: .
    container_name: calcifer
    ports:
      - "8001:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      no-face:
        condition: service_healthy
      heen:
        condition: service_healthy
    networks:
      - howls-network
    restart: unless-stopped

  no-face:                           # PostgreSQL (mysterious, stores everything silently)
    image: postgres:16-alpine
    container_name: no-face
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - no-face-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - howls-network
    restart: unless-stopped

  heen:                              # Redis (the little dog, fast and reliable)
    image: redis:7-alpine
    container_name: heen
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - howls-network
    restart: unless-stopped

  zeniba:                            # Alembic migration runner (wise, runs once and rests)
    build: .
    container_name: zeniba
    command: alembic upgrade head
    env_file: .env
    volumes:
    - ./alembic:/app/alembic        # ← add this
    - ./alembic.ini:/app/alembic.ini  # ← add this
    depends_on:
      no-face:
        condition: service_healthy
    networks:
      - howls-network
    restart: on-failure

volumes:
  no-face-data:

networks:
  howls-network:
    driver: bridge